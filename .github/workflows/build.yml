name: Build APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20 # حدثناها لـ 20 عشان تتماشى مع المتطلبات الجديدة

      - name: Fix package.json catalog issue
        run: |
          sed -i 's/"catalog:"/"latest"/g' package.json

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Fix Missing Icon Issue
        run: |
          # دي الحركة اللي هتخلي الموبايل يكمل من غير ما يدور على الأيقونة المفقودة
          sed -i 's/"adaptiveIcon":.*//g' app.json
          mkdir -p assets
          touch assets/adaptive-icon.png

      - name: Prebuild Expo Application
        run: npx expo prebuild --platform android

      - name: Build Android Preview (APK)
        run: |
          cd android && ./gradlew assembleDebug
