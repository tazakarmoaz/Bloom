name: Build APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Clean package.json (إصلاح كلمة catalog الملعونة)
        run: |
          sed -i 's/catalog://g' package.json
          # التأكد من إزالة أي علامات غريبة قد تكون موجودة
          sed -i 's/"catalog"://g' package.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Fix Assets
        run: |
          mkdir -p assets
          touch assets/icon.png
          touch assets/adaptive-icon.png
          touch assets/favicon.png

      - name: Prebuild Expo Application
        run: npx expo prebuild --platform android

      - name: Build Android Preview (APK)
        run: |
          cd android && ./gradlew assembleDebug
