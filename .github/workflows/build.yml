name: Build APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Fix package.json catalog issue
        run: |
          sed -i 's/"catalog:"/"latest"/g' package.json

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Prebuild Expo Application
        run: npx expo prebuild --platform android
        # السطر ده بيولد ملفات الاندرويد الأصلية علطول من غير EAS 🚀

      - name: Build Android Preview (APK)
        run: |
          cd android && ./gradlew assembleDebug
        # ده الأمر السحري اللي بيطبخ الـ APK محلي جوة جيت هاب ومحدش يقدر يوقفه 😎
