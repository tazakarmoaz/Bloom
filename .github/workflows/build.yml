name: Build APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Clean package.json
        run: |
          sed -i 's/catalog://g' package.json
          sed -i 's/"catalog"://g' package.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Fix Assets
        run: |
          mkdir -p assets
          wget -qO assets/icon.png https://raw.githubusercontent.com/expo/expo/main/templates/expo-template-blank/assets/icon.png
          wget -qO assets/adaptive-icon.png https://raw.githubusercontent.com/expo/expo/main/templates/expo-template-blank/assets/adaptive-icon.png
          wget -qO assets/favicon.png https://raw.githubusercontent.com/expo/expo/main/templates/expo-template-blank/assets/favicon.png

      - name: Prebuild Expo Application
        run: npx expo prebuild --platform android --no-install

      - name: Build Android Preview (APK)
        run: |
          cd android && ./gradlew assembleDebug
